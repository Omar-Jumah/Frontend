<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="particles"></canvas>

<div class="app">

    <div class="sidebar">
        <div class="profile">
            <img src="https://i.pinimg.com/736x/3c/d2/53/3cd253cb54b9b6cb08eb40c39c9e49f1.jpg" alt="Profile">
            <div class="profile-text">
                <span>User</span>
            </div>
        </div>

        <div class="nav">
            <div class="active">Dashboard</div>
            <div>My Products</div>
            <div>Generated Content</div>
            <div>Enhance Pictures</div>
            <div>Settings</div>
        </div>
    </div>

    <div class="main-content">

        <div class="top-row">
            <div class="top-actions"></div>

            <div class="title-area">
                <div class="app-title">SmartShop AI</div>
                <div class="page-title">AI Result</div>
            </div>
        </div>

        <div class="workspace-row">

            <div class="image-workspace">
                <div class="image-header">Uploaded Picture</div>

                <div class="image-container">
                    <div class="image-overlay-scene"></div>
                    <div class="image-dust"></div>

                    <img
                        id="productImage"
                        src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"
                        alt="Product Image"
                    >
                </div>

                <div class="image-buttons">
                    <input
                        type="file"
                        id="imageUpload"
                        accept="image/*"
                        hidden
                    >

                    <button class="btn btn-cyan" id="uploadBtn">
                        رفع صورة
                    </button>

                    <button class="btn btn-magenta" id="enhanceBtn">
                        تحليل المنتج
                    </button>
                </div>
            </div>

            <div class="results-column">

                <div class="card result-progress">
                    <div class="card-content">
                        <div class="card-label">Generated Content</div>
                        <div class="quality-label">AI Product Analysis</div>
                    </div>

                    
                </div>

                <div class="card result-card">
                    <div class="card-header">
                        <b>AI Analysis</b>
                    </div>

                    <p class="muted-text text-rtl" id="aiResult">
                        نتائج الذكاء الاصطناعي ستظهر هنا
                    </p>
                </div>

                <div class="card result-card ad-card">
                    <div class="card-header">
                        <b>Social Media AD</b>
                    </div>

                    <p class="muted-text text-rtl ad-line" id="socialAd">
                        الإعلان سيظهر هنا
                    </p>

                    <p class="muted-text text-rtl ad-line" id="bioCaption">
                        الكابشن سيظهر هنا
                    </p>
                </div>

                <div class="card result-card tags-card">
                    <div class="card-header">
                        <b>Suggested Hashtags</b>
                    </div>

                    <p class="cyan-text text-rtl ad-line" id="hashtags">
                        الهاشتاقات ستظهر هنا
                    </p>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
